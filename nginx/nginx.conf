events {}

http {
    server {
        listen 80;
        server_name jhhuangtechspace233.cc www.jhhuangtechspace233.cc;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    
    server {
        listen 443 ssl;
        server_name jhhuangtechspace233.cc www.jhhuangtechspace233.cc;

        ssl_certificate /etc/letsencrypt/live/jhhuangtechspace233.cc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jhhuangtechspace233.cc/privkey.pem;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}